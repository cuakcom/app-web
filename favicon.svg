<svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .norris-body { fill: #D4754F; }
      .norris-clothes { fill: #F5DEB3; }
      .norris-pants { fill: #1a1a1a; }
      .norris-accent { stroke: #FF8C42; fill: none; stroke-linecap: round; }
      .norris-outline { stroke: #000; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Head -->
  <circle cx="120" cy="50" r="22" class="norris-body"/>

  <!-- Hair -->
  <path d="M 100 45 Q 95 20 120 15 Q 145 20 140 45" class="norris-body"/>

  <!-- Face -->
  <circle cx="115" cy="48" r="2.5" fill="#000"/> <!-- Left eye -->
  <circle cx="130" cy="48" r="2.5" fill="#000"/> <!-- Right eye -->
  <path d="M 115 60 Q 122 65 130 60" class="norris-outline" stroke-width="2"/>

  <!-- Body/Gi -->
  <rect x="105" y="72" width="30" height="45" fill="#F5DEB3" rx="3"/>

  <!-- Left arm (extended punch/balance) -->
  <line x1="105" y1="85" x2="35" y2="75" stroke="#D4754F" stroke-width="6" stroke-linecap="round"/>
  <circle cx="30" cy="73" r="5" class="norris-body"/>

  <!-- Right arm (up) -->
  <line x1="135" y1="82" x2="155" y2="50" stroke="#D4754F" stroke-width="6" stroke-linecap="round"/>
  <circle cx="160" cy="48" r="5" class="norris-body"/>

  <!-- Left leg (kicking) -->
  <line x1="110" y1="117" x2="70" y2="35" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
  <ellipse cx="65" cy="30" rx="10" ry="8" fill="#000"/>

  <!-- Right leg (standing/balance) -->
  <line x1="130" y1="117" x2="130" y2="200" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Right foot -->
  <ellipse cx="130" cy="210" rx="12" ry="9" fill="#000"/>

  <!-- Belt -->
  <rect x="105" y="115" width="30" height="4" fill="#000"/>

  <!-- Orange accent arc (dynamic swoosh) -->
  <path d="M 170 220 Q 200 180 210 110" stroke="#FF8C42" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Additional dynamic lines for movement effect -->
  <path d="M 50 100 Q 40 80 35 60" class="norris-accent" stroke-width="3"/>
</svg>
