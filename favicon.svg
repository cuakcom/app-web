<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FF6B35" stroke-width="3"/>

  <!-- Head -->
  <circle cx="100" cy="50" r="16" fill="#D4754F"/>
  <!-- Hair -->
  <path d="M 85 48 Q 83 30 100 25 Q 117 30 115 48" fill="#8B4513"/>

  <!-- Body -->
  <rect x="90" y="68" width="20" height="32" fill="#FFD700" rx="2"/>

  <!-- Left arm (extended) -->
  <line x1="90" y1="78" x2="55" y2="70" stroke="#D4754F" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="50" cy="68" r="3.5" fill="#D4754F"/>

  <!-- Right arm (back) -->
  <line x1="110" y1="78" x2="135" y2="88" stroke="#D4754F" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="140" cy="90" r="3.5" fill="#D4754F"/>

  <!-- Left leg (kicking up) -->
  <line x1="94" y1="100" x2="72" y2="48" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="72,48 67,53 70,63 77,58" fill="#1a1a1a"/>

  <!-- Right leg (standing) -->
  <line x1="106" y1="100" x2="108" y2="155" stroke="#1a1a1a" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="110" cy="160" rx="7" ry="5.5" fill="#1a1a1a"/>

  <!-- Left foot -->
  <ellipse cx="70" cy="50" rx="6" ry="4.5" fill="#1a1a1a"/>

  <!-- Face details -->
  <!-- Eyes -->
  <circle cx="94" cy="46" r="2.2" fill="#000"/>
  <circle cx="106" cy="46" r="2.2" fill="#000"/>
  <!-- Mouth (confident smirk) -->
  <path d="M 94 52 Q 100 54 106 52" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Orange accent arc (bottom right) -->
  <path d="M 145 165 Q 175 145 185 110" stroke="#FF6B35" stroke-width="3.5" fill="none" stroke-linecap="round"/>
</svg>
