<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg-circle { fill: #f5f5f5; }
      .border-circle { fill: none; stroke: #4a4a4a; stroke-width: 16; }
      .head { fill: #c85a4a; }
      .body { fill: #f0f0f0; stroke: #000; stroke-width: 2.5; }
      .skin { fill: #e8b8a0; stroke: #000; stroke-width: 2; }
      .hair { fill: #8b4513; }
      .board { fill: #2a2a2a; stroke: #000; stroke-width: 1.5; }
      .outline { stroke: #000; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .orange-accent { stroke: #ff8c42; fill: none; stroke-width: 3; stroke-linecap: round; }
      .star { fill: #ff8c42; }
    </style>
  </defs>

  <!-- Outer circle border -->
  <circle cx="120" cy="120" r="112" class="border-circle"/>

  <!-- Background circle -->
  <circle cx="120" cy="120" r="108" class="bg-circle"/>

  <!-- Skateboard/Platform -->
  <ellipse cx="120" cy="185" rx="45" ry="12" class="board"/>
  <ellipse cx="120" cy="183" rx="45" ry="10" fill="#1a1a1a"/>

  <!-- Skateboard wheels -->
  <circle cx="95" cy="188" r="5" class="board"/>
  <circle cx="145" cy="188" r="5" class="board"/>

  <!-- Ground line -->
  <line x1="60" y1="192" x2="180" y2="192" stroke="#000" stroke-width="2"/>

  <!-- Body (shirt/gi) -->
  <rect x="95" y="95" width="50" height="45" rx="3" class="body"/>
  <line x1="120" y1="95" x2="120" y2="140" stroke="#000" stroke-width="2"/>

  <!-- Head -->
  <circle cx="120" cy="65" r="20" class="head"/>

  <!-- Hair -->
  <path d="M 100 55 Q 95 35 120 30 Q 145 35 140 55" class="hair" stroke="#000" stroke-width="2"/>

  <!-- Face -->
  <circle cx="113" cy="62" r="2.5" fill="#000"/>
  <circle cx="127" cy="62" r="2.5" fill="#000"/>
  <path d="M 113 70 Q 120 73 127 70" class="outline"/>

  <!-- Left arm (extended) -->
  <line x1="95" y1="105" x2="45" y2="85" stroke="#e8b8a0" stroke-width="5" stroke-linecap="round"/>
  <circle cx="42" cy="83" r="4" class="skin"/>

  <!-- Right arm (up) -->
  <line x1="145" y1="100" x2="170" y2="70" stroke="#e8b8a0" stroke-width="5" stroke-linecap="round"/>
  <circle cx="173" cy="68" r="4" class="skin"/>

  <!-- Left leg (kicking) -->
  <line x1="105" y1="140" x2="65" y2="50" stroke="#000" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="60" cy="45" rx="9" ry="7" fill="#000"/>

  <!-- Right leg (standing on skateboard) -->
  <line x1="135" y1="140" x2="135" y2="178" stroke="#000" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="135" cy="182" rx="7" ry="5" fill="#000"/>

  <!-- Belt -->
  <rect x="95" y="138" width="50" height="3" fill="#000"/>

  <!-- Orange dynamic arc (swoosh) -->
  <path d="M 165 175 Q 190 140 200 100" class="orange-accent"/>

  <!-- Orange curved line (motion) -->
  <path d="M 150 195 Q 170 180 180 160" class="orange-accent"/>

  <!-- Orange star at base -->
  <g transform="translate(120, 205)">
    <polygon points="0,-8 2.4,-2.4 8,-0.8 2.4,2.4 3.2,8 0,4.8 -3.2,8 -2.4,2.4 -8,-0.8 -2.4,-2.4" class="star"/>
  </g>

  <!-- Additional motion lines -->
  <path d="M 55 80 Q 50 75 45 70" class="orange-accent" stroke-width="2"/>
</svg>
