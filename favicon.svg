<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a6c"/>
      <stop offset="100%" style="stop-color:#0f4c81"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Network nodes -->
  <circle cx="32" cy="14" r="5" fill="#4f9cf9" opacity="0.9"/>
  <circle cx="14" cy="42" r="5" fill="#4f9cf9" opacity="0.9"/>
  <circle cx="50" cy="42" r="5" fill="#4f9cf9" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="32" y1="19" x2="14" y2="37" stroke="#4f9cf9" stroke-width="2" opacity="0.5"/>
  <line x1="32" y1="19" x2="50" y2="37" stroke="#4f9cf9" stroke-width="2" opacity="0.5"/>
  <line x1="19" y1="42" x2="45" y2="42" stroke="#4f9cf9" stroke-width="2" opacity="0.5"/>
  <!-- Magnifying glass -->
  <circle cx="32" cy="31" r="9" fill="none" stroke="#7ec8ff" stroke-width="2.5"/>
  <line x1="38.4" y1="37.4" x2="44" y2="43" stroke="#7ec8ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- DNS pulse dot -->
  <circle cx="32" cy="31" r="3" fill="#7ec8ff" opacity="0.85"/>
</svg>
